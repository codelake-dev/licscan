version: 2

project_name: licscan

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: licscan
    main: ./cmd/licscan
    binary: licscan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/codelake-dev/licscan/internal/version.Version={{ .Version }}
      - -X github.com/codelake-dev/licscan/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/codelake-dev/licscan/internal/version.BuildDate={{ .Date }}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - NOTICE
      - README.md
      - CHANGELOG.md
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: codelake-dev
    name: licscan
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## LicScan v{{ .Version }}

    Open-source license & compliance scanner for modern codebases.

    See [CHANGELOG.md](https://github.com/codelake-dev/licscan/blob/main/CHANGELOG.md) for details.
  footer: |
    ---
    LicScan · by codelake Technologies LLC. An Akyros Labs brand.

brews:
  - name: licscan
    repository:
      owner: codelake-dev
      name: homebrew-tap
    homepage: https://github.com/codelake-dev/licscan
    description: Open-source license & compliance scanner
    license: Apache-2.0
    install: |
      bin.install "licscan"
    test: |
      system "#{bin}/licscan", "--version"
