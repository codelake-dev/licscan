version: 2
updates:
  # Go module updates — monthly cadence keeps PR noise low. Critical
  # security advisories still come through Dependabot alerts separately
  # and don't wait for the monthly window.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
      include: scope
    labels:
      - dependencies
      - go

  # Pin GitHub Actions used by our own workflows — supply-chain hygiene.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(actions)"
      include: scope
    labels:
      - dependencies
      - github-actions
