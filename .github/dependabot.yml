version: 2
updates:
  # Go module updates — monthly cadence keeps PR noise low. Critical
  # security advisories still come through Dependabot alerts separately
  # and don't wait for the monthly window.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
      include: scope
    labels:
      - dependencies
      - go
    ignore:
      # golang.org/x/mod ≥ 0.22 declares `go 1.25.0` in its own go.mod,
      # which breaks our CI (matrix is Go 1.22/1.23, golangci-lint
      # binary is built with Go 1.24). Lift this pin once the CI moves
      # to Go 1.25+. See commit beaf117 + closed PR #6 for context.
      - dependency-name: "golang.org/x/mod"
        versions: [">=0.22.0"]

  # Pin GitHub Actions used by our own workflows — supply-chain hygiene.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(actions)"
      include: scope
    labels:
      - dependencies
      - github-actions
