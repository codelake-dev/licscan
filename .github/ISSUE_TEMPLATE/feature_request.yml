name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Before opening, please check whether your suggestion is already on the [roadmap](https://github.com/codelake-dev/licscan#roadmap) or covered by an existing issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing pain. "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? A CLI flag? A new format? A new detector?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why

  - type: dropdown
    id: scope
    attributes:
      label: Scope estimate
      description: Your gut feel — not binding
      options:
        - Small (one-file change, no new dep)
        - Medium (new module, no breaking change)
        - Large (new detector / new output format / config surface)
        - Don't know

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, related projects, prior art
