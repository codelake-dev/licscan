name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Verify modules are tidy
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.23'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Run tests
        run: go test ./... -race -count=1
      - name: Coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.23'
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          # Our .golangci.yml uses the v2 config schema (migrated
          # 2026-05-24). The action v6 only supports golangci-lint v1.x
          # and rejects 'v2.x' version strings — bump the action to v7.
          version: v2.1.6
          args: --timeout=5m

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - name: Build
        run: go build -o licscan ./cmd/licscan
      - name: Smoke test
        shell: bash
        run: |
          ./licscan --version
          ./licscan about
          ./licscan scan . --format json
