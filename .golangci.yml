version: "2"
run:
  go: "1.22"
linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 4
      min-occurrences: 5
    gosec:
      # G703: Path traversal via taint analysis. Our "tainted" inputs are
      # always manifest files the user explicitly asked us to scan (go.mod,
      # package.json, Cargo.lock, etc.). The tool's whole purpose is to read
      # files from a user-supplied directory, so this rule produces only
      # false positives in our context.
      excludes:
        - G703
    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - goconst
          - gosec
          - prealloc
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/codelake-dev/licscan
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
