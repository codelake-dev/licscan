run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocyclo
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - dupl
    - goconst
    - nakedret
    - prealloc

linters-settings:
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/codelake-dev/licscan
  revive:
    rules:
      - name: exported
        severity: warning
      - name: package-comments

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - dupl
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
