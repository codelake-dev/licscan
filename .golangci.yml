version: "2"
run:
  go: "1.22"
linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 4
      min-occurrences: 5
    # gosec exclusions are configured via text-matching in
    # linters.exclusions.rules below (G703 is a gosec rule that isn't
    # in the official enum schema, so the gosec.excludes block can't
    # accept it — text matching works for any rule ID).
    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - goconst
          - gosec
          - prealloc
        path: _test\.go
      # gosec G304 + G703: "file inclusion via variable" / "path traversal
      # via taint". Our whole purpose is reading files from a user-supplied
      # scan directory — these rules fire on every os.ReadFile against a
      # manifest path and produce only false positives in our context.
      - linters:
          - gosec
        text: "G304|G703"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/codelake-dev/licscan
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
